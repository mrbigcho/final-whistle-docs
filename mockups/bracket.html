<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Whistle — 대진표</title>
<link rel="stylesheet" href="_common.css">
<style>
.bracket-scroll {
  flex: 1;
  overflow: auto;
  padding: 16px 12px;
  scrollbar-width: none;
}
.bracket-scroll::-webkit-scrollbar { display: none; }
.bracket-tree {
  display: flex;
  gap: 16px;
  align-items: center;
  min-width: 600px;
}
.bracket-round {
  display: flex;
  flex-direction: column;
  gap: 0;
  flex-shrink: 0;
}
.round-header {
  font-size: 10px;
  font-weight: 700;
  color: var(--on-surface-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  text-align: center;
  margin-bottom: 8px;
  padding: 4px 8px;
  background: var(--surface3);
  border-radius: 6px;
}
.match-wrapper {
  display: flex;
  align-items: center;
  position: relative;
}
.match-card {
  width: 140px;
  background: var(--surface2);
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
  flex-shrink: 0;
}
.match-card:hover { border-color: var(--primary); }
.match-player {
  padding: 8px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  gap: 4px;
}
.match-player:first-child {
  border-bottom: 1px solid var(--border);
}
.match-player.winner {
  color: var(--primary-light);
  font-weight: 600;
  background: rgba(108,99,255,0.08);
}
.match-player:not(.winner) {
  color: var(--on-surface-muted);
}
.match-player.tbd { color: var(--border); font-style: italic; }
.player-name {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-score {
  font-weight: 700;
  font-size: 13px;
  min-width: 18px;
  text-align: right;
}
.win-icon { font-size: 10px; margin-left: 2px; }

/* Connector lines */
.connector {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 16px;
  flex-shrink: 0;
}
.connector-line {
  width: 2px;
  background: var(--border);
  flex: 1;
}
.connector-h {
  height: 2px;
  width: 16px;
  background: var(--border);
}

/* Round spacers for visual alignment */
.round-qf { gap: 8px; }
.round-sf .match-wrapper { margin: 28px 0; }
.round-f .match-wrapper { margin: 70px 0; }

/* Tab bar for format switch */
.format-tabs {
  display: flex;
  background: var(--surface3);
  border-radius: 10px;
  margin: 12px 16px;
  padding: 4px;
  gap: 4px;
  flex-shrink: 0;
}
.format-tab {
  flex: 1;
  padding: 7px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--on-surface-muted);
  border-radius: 7px;
  cursor: pointer;
}
.format-tab.active {
  background: var(--surface);
  color: var(--on-surface);
}
</style>
</head>
<body>
<nav class="page-nav">
  <span class="nav-title">목업:</span>
  <a href="index.html">← 목록</a>

        </div>
      </div>
    </div>
  </div>
