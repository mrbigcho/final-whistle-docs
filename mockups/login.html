<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Whistle — 로그인 / 회원가입</title>
<link rel="stylesheet" href="_common.css">
<style>
.phone-screen { background: var(--bg); justify-content: center; align-items: center; }
.auth-container {
  width: 100%;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.logo-section {
  text-align: center;
  margin-bottom: 32px;
}
.logo-icon {
  font-size: 56px;
  margin-bottom: 12px;
}
.logo-title {
  font-size: 28px;
  font-weight: 800;
  color: var(--on-surface);
  margin-bottom: 6px;
}
.logo-subtitle {
  font-size: 13px;
  color: var(--on-surface-muted);
}
.auth-card {
  width: 100%;
  background: var(--surface2);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.auth-tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.auth-tab {
  flex: 1;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--on-surface-muted);
  border-bottom: 2px solid transparent;
}
.auth-tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}
.auth-form {
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field-label {
  font-size: 12px;
  color: var(--on-surface-muted);
  font-weight: 500;
}
.field-input {
  background: var(--surface3);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 14px;
  color: var(--on-surface);
  width: 100%;
}
.field-input.focused {
  border-color: var(--primary);
}
.submit-btn {
  margin-top: 4px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 100px;
  height: 48px;
  width: 100%;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.page-title-bar {
  text-align: center;
  padding: 8px;
  font-size: 12px;
  color: var(--on-surface-muted);
  background: #0f0f1a;
}
</style>
</head>
<body>
<nav class="page-nav">
  <span class="nav-title">목업:</span>
  <a href="index.html">← 목록</a>
  <a href="home.html">홈</a>
  <a href="profile.html">프로필</a>
</nav>

<div class="phone-frame">
  <div class="phone-screen" style="padding-top: 40px;">
    <div class="auth-container">
      <div class="logo-section">
        <div class="logo-icon">⚽</div>
        <div class="logo-title">Final Whistle</div>
        <div class="logo-subtitle">e스포츠 토너먼트 &amp; 판타지 리그</div>
      </div>

      <div class="auth-card">
        <div class="auth-tab-bar">
          <div class="auth-tab active">로그인</div>
          <div class="auth-tab">회원가입</div>
        </div>
        <div class="auth-form">
          <div class="form-group">
            <label class="field-label">이메일</label>
            <div class="field-input focused" style="color: #8E8EA0;">example@email.com</div>
          </div>
          <div class="form-group">
            <label class="field-label">비밀번호</label>
            <div class="field-input" style="color: #8E8EA0; letter-spacing: 3px;">••••••••</div>
          </div>
          <button class="submit-btn">
            로그인
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div style="margin-top: 16px; text-align: center;">
  <p class="text-muted text-sm">auth_screen.dart · AuthScreen</p>
  <p class="text-muted text-xs" style="margin-top:4px">TabBar: 로그인 | 회원가입 · 전체 화면 중앙 배치</p>
</div>
</body>
</html>
