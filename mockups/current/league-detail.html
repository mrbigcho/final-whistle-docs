<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Whistle — 리그 상세</title>
<link rel="stylesheet" href="../_common.css">
<style>
.league-header {
  background: var(--surface);
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.league-title-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.league-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, #1a1040, #3b2db5);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
}
.league-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--on-surface);
  margin-bottom: 4px;
}
.league-actions {
  display: flex;
  gap: 8px;
}

.player-card {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  gap: 12px;
  border-bottom: 1px solid rgba(58,58,82,0.4);
  cursor: pointer;
}
.player-card:hover { background: var(--surface2); }
.player-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--surface3);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  border: 2px solid var(--border);
}
.player-info { flex: 1; min-width: 0; }
.player-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--on-surface);
  margin-bottom: 2px;
}
.player-pos {
  font-size: 11px;
  color: var(--on-surface-muted);
}
.overall-badge {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  font-weight: 800;
  flex-shrink: 0;
}
.ovr-gold { background: rgba(255,193,7,0.2); color: #FFC107; }
.ovr-silver { background: rgba(176,196,222,0.2); color: #B0C4DE; }
.ovr-bronze { background: rgba(205,133,63,0.2); color: #CD853F; }
.ovr-default { background: var(--surface3); color: var(--on-surface-muted); }

.owner-chip {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 999px;
  font-weight: 600;
  background: rgba(108,99,255,0.15);
  color: var(--primary-light);
}

/* FABs */
.fab-stack {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
  z-index: 10;
}
.fab-mini {
  height: 44px;
  padding: 0 16px;
  border-radius: 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--on-surface);
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.fab-main {
  height: 52px;
  padding: 0 20px;
  border-radius: 16px;
  background: var(--primary);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(108,99,255,0.4);
}
</style>
</head>
<body>
<nav class="page-nav">
  <span class="nav-title">목업:</span>
  <a href="index.html">← 목록</a>
  <a href="club-detail.html">클럽 상세</a>
  <a href="auction.html">경매</a>
  <a href="transfer.html">이적 시장</a>
</nav>

<div class="phone-frame">
  <div class="phone-screen">
    <div class="app-bar">
      <div class="app-bar-icon">←</div>
      <span class="app-bar-title">FC 스카이 판타지</span>
      <div class="app-bar-icon" title="이적 시장">🔄</div>
      <div class="app-bar-icon" title="상태 변경">⚙️</div>
    </div>

    <!-- League header -->
    <div class="league-header">
      <div class="league-title-row">
        <div class="league-icon">🌟</div>
        <div>
          <div class="league-name">FC 스카이 판타지</div>
          <div style="display:flex; gap:6px; align-items:center;">
            <span class="chip auction">경매 중</span>
            <span style="font-size:11px; color:var(--on-surface-muted);">📅 2025-04-01 시작</span>
          </div>
        </div>
      </div>
      <div class="league-actions">
        <button class="btn btn-filled btn-sm">🔨 경매 시작</button>
        <button class="btn btn-outlined btn-sm">선수 추가</button>
      </div>
    </div>

    <!-- TabBar -->
    <div class="tab-bar">
      <div class="tab active">선수 목록</div>
      <div class="tab">팀 관리</div>
    </div>

    <!-- Players list -->
    <div class="content" style="padding-bottom: 80px;">
      <div class="player-card">
        <div class="player-avatar">⚽</div>
        <div class="player-info">
          <div class="player-name">손흥민</div>
          <div class="player-pos">FW · 토트넘</div>
        </div>
        <span class="overall-badge ovr-gold">92</span>
      </div>
      <div class="player-card">
        <div class="player-avatar">⚽</div>
        <div class="player-info">
          <div class="player-name">이강인</div>
          <div class="player-pos">MF · PSG</div>
        </div>
        <span class="overall-badge ovr-gold">88</span>
        <span class="owner-chip" style="margin-left:6px;">팀A</span>
      </div>
      <div class="player-card">
        <div class="player-avatar">⚽</div>
        <div class="player-info">
          <div class="player-name">김민재</div>
          <div class="player-pos">CB · 바이에른</div>
        </div>
        <span class="overall-badge ovr-gold">87</span>
        <span class="owner-chip" style="margin-left:6px;">팀B</span>
      </div>
      <div class="player-card">
        <div class="player-avatar">⚽</div>
        <div class="player-info">
          <div class="player-name">황희찬</div>
          <div class="player-pos">FW · 울버햄튼</div>
        </div>
        <span class="overall-badge ovr-silver">84</span>
      </div>
      <div class="player-card">
        <div class="player-avatar">⚽</div>
        <div class="player-info">
          <div class="player-name">정우영</div>
          <div class="player-pos">MF · 프라이부르크</div>
        </div>
        <span class="overall-badge ovr-silver">82</span>
      </div>
      <div class="player-card">
        <div class="player-avatar">⚽</div>
        <div class="player-info">
          <div class="player-name">조현우</div>
          <div class="player-pos">GK · 울산</div>
        </div>
        <span class="overall-badge ovr-bronze">80</span>
      </div>
    </div>
  </div>
</div>

<div style="margin-top:16px; text-align:center;">
  <p class="text-muted text-sm">league_detail_screen.dart · LeagueDetailScreen</p>
  <p class="text-muted text-xs" style="margin-top:4px">리그 헤더 + TabBar(선수목록|팀관리) + FAB(경매/선수추가)</p>
</div>
</body>
</html>
