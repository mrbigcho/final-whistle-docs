<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Whistle — MY 프로필</title>
<link rel="stylesheet" href="../_common.css">
<style>
.profile-card {
  margin: 20px 16px 8px;
  background: linear-gradient(135deg, #1e1b40, #2d2868);
  border-radius: 20px;
  border: 1px solid rgba(108,99,255,0.3);
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  text-align: center;
}
.profile-avatar-ring {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(108,99,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 38px;
  border: 3px solid rgba(108,99,255,0.6);
  box-shadow: 0 0 20px rgba(108,99,255,0.3);
}
.profile-email {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
}
.profile-subtitle {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
}
.profile-stats {
  display: flex;
  gap: 20px;
  margin-top: 4px;
}
.stat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.stat-value {
  font-size: 18px;
  font-weight: 800;
  color: #fff;
}
.stat-label {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.menu-card {
  margin: 8px 16px;
  background: var(--surface2);
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.menu-item {
  display: flex;
  align-items: center;
  padding: 15px 16px;
  gap: 14px;
  cursor: pointer;
  transition: background 0.15s;
}
.menu-item:hover { background: var(--surface3); }
.menu-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.menu-icon.purple { background: rgba(108,99,255,0.15); }
.menu-icon.gray { background: var(--surface3); }
.menu-icon.red { background: rgba(244,67,54,0.1); }
.menu-text { flex: 1; }
.menu-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--on-surface);
}
.menu-subtitle {
  font-size: 11px;
  color: var(--on-surface-muted);
  margin-top: 1px;
}
.menu-title.danger { color: #EF5350; }
.menu-trailing {
  color: var(--on-surface-muted);
  font-size: 16px;
}
.coming-soon-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--surface3);
  color: var(--on-surface-muted);
  font-weight: 600;
}

.version-text {
  text-align: center;
  padding: 24px 0 8px;
  font-size: 11px;
  color: var(--on-surface-muted);
  opacity: 0.5;
}
</style>
</head>
<body>
<nav class="page-nav">
  <span class="nav-title">목업:</span>
  <a href="index.html">← 목록</a>
  <a href="edit-profile.html">프로필 수정</a>
  <a href="home.html">홈</a>
</nav>

<div class="phone-frame">
  <div class="phone-screen">
    <div class="app-bar">
      <span class="app-bar-title">MY</span>
    </div>

    <div class="content" style="padding-bottom: 16px;">

      <!-- Profile card -->
      <div class="profile-card">
        <div class="profile-avatar-ring">👤</div>
        <div>
          <div class="profile-email">user@example.com</div>
          <div class="profile-subtitle">Final Whistle 사용자</div>
        </div>
        <div class="profile-stats">
          <div class="stat-item">
            <div class="stat-value">12</div>
            <div class="stat-label">대회</div>
          </div>
          <div style="width:1px; background:rgba(255,255,255,0.1); align-self:stretch;"></div>
          <div class="stat-item">
            <div class="stat-value">3</div>
            <div class="stat-label">클럽</div>
          </div>
          <div style="width:1px; background:rgba(255,255,255,0.1); align-self:stretch;"></div>
          <div class="stat-item">
            <div class="stat-value">7</div>
            <div class="stat-label">우승</div>
          </div>
        </div>
      </div>

      <!-- Menu -->
      <div class="section-header">계정 설정</div>
      <div class="menu-card">
        <div class="menu-item">
          <div class="menu-icon purple">✏️</div>
          <div class="menu-text">
            <div class="menu-title">프로필 수정</div>
            <div class="menu-subtitle">닉네임, 표시 이름, 자기소개</div>
          </div>
          <span class="menu-trailing">›</span>
        </div>
        <div class="divider"></div>
        <div class="menu-item">
          <div class="menu-icon gray">🔔</div>
          <div class="menu-text">
            <div class="menu-title">알림 설정</div>
          </div>
          <span class="coming-soon-badge">준비 중</span>
        </div>
        <div class="divider"></div>
        <div class="menu-item">
          <div class="menu-icon gray">🔒</div>
          <div class="menu-text">
            <div class="menu-title">비밀번호 변경</div>
          </div>
          <span class="coming-soon-badge">준비 중</span>
        </div>
      </div>

      <div class="menu-card" style="margin-top: 8px;">
        <div class="menu-item">
          <div class="menu-icon red">🚪</div>
          <div class="menu-text">
            <div class="menu-title danger">로그아웃</div>
          </div>
        </div>
      </div>

      <div class="version-text">v0.1.0</div>
    </div>

    <div class="bottom-nav">
      <div class="bottom-nav-item">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">홈</span>
      </div>
      <div class="bottom-nav-item">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">대회</span>
      </div>
      <div class="bottom-nav-item">
        <span class="nav-icon">👥</span>
        <span class="nav-label">클럽</span>
      </div>
      <div class="bottom-nav-item active">
        <span class="nav-icon">👤</span>
        <span class="nav-label">MY</span>
      </div>
    </div>
  </div>
</div>

<div style="margin-top:16px; text-align:center;">
  <p class="text-muted text-sm">my_screen.dart · MyScreen</p>
  <p class="text-muted text-xs" style="margin-top:4px">프로필 카드 + 메뉴(프로필수정·알림설정·로그아웃) + 버전</p>
</div>
</body>
</html>
