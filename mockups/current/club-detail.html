<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Whistle — 클럽 상세</title>
<link rel="stylesheet" href="../_common.css">
<style>
.club-header {
  background: var(--surface);
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 10px;
}
.club-header-avatar {
  width: 72px; height: 72px;
  border-radius: 20px;
  background: linear-gradient(135deg, #2a2060, #4B44CC);
  display: flex; align-items: center; justify-content: center;
  font-size: 34px;
  font-weight: 800;
  color: #fff;
}
.club-header-name {
  font-size: 20px;
  font-weight: 700;
  color: var(--on-surface);
}
.club-header-desc {
  font-size: 13px;
  color: var(--on-surface-muted);
  line-height: 1.5;
}
.club-header-meta {
  display: flex;
  gap: 16px;
  margin-top: 4px;
}
.club-meta-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.club-meta-value {
  font-size: 16px;
  font-weight: 700;
  color: var(--on-surface);
}
.club-meta-label {
  font-size: 10px;
  color: var(--on-surface-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.meta-divider {
  width: 1px;
  background: var(--border);
  align-self: stretch;
}

.member-tile {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  gap: 12px;
  border-bottom: 1px solid rgba(58,58,82,0.4);
}
.member-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--surface3);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.member-name {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  color: var(--on-surface);
}
.creator-badge {
  font-size: 10px;
  color: #FFC107;
  background: rgba(255,193,7,0.1);
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 600;
}

.league-item {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  gap: 12px;
  border-bottom: 1px solid rgba(58,58,82,0.4);
  cursor: pointer;
}
.league-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: rgba(108,99,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
</style>
</head>
<body>
<nav class="page-nav">
  <span class="nav-title">목업:</span>
  <a href="index.html">← 목록</a>
  <a href="club-list.html">클럽 목록</a>
  <a href="league-detail.html">리그 상세</a>
</nav>

<div class="phone-frame">
  <div class="phone-screen">
    <div class="app-bar">
      <div class="app-bar-icon">←</div>
      <span class="app-bar-title">FC 스카이</span>
      <div class="app-bar-icon">✏️</div>
    </div>

    <!-- Club Header -->
    <div class="club-header">
      <div class="club-header-avatar">F</div>
      <div>
        <div class="club-header-name">FC 스카이</div>
        <div style="margin-top:4px;"><span class="chip public">🌐 공개 클럽</span></div>
      </div>
      <div class="club-header-desc">서울 기반 e스포츠 팀 클럽입니다.<br>매주 토요일 정기 대회를 진행합니다.</div>
      <div class="club-header-meta">
        <div class="club-meta-item">
          <div class="club-meta-value">12</div>
          <div class="club-meta-label">멤버</div>
        </div>
        <div class="meta-divider"></div>
        <div class="club-meta-item">
          <div class="club-meta-value">5</div>
          <div class="club-meta-label">대회</div>
        </div>
        <div class="meta-divider"></div>
        <div class="club-meta-item">
          <div class="club-meta-value">2</div>
          <div class="club-meta-label">리그</div>
        </div>
      </div>
    </div>

    <!-- TabBar -->
    <div class="tab-bar">
      <div class="tab">대회</div>
      <div class="tab">리그</div>
      <div class="tab active">멤버</div>
    </div>

    <!-- Members tab content -->
    <div class="content" style="padding-bottom:16px;">
      <div class="member-tile">
        <div class="member-avatar" style="background:rgba(255,193,7,0.1);">⭐</div>
        <div class="member-name">김민준</div>
        <span class="creator-badge">주최자</span>
      </div>
      <div class="member-tile">
        <div class="member-avatar">👤</div>
        <div class="member-name">이서준</div>
      </div>
      <div class="member-tile">
        <div class="member-avatar">👤</div>
        <div class="member-name">박지호</div>
      </div>
      <div class="member-tile">
        <div class="member-avatar">👤</div>
        <div class="member-name">최현우</div>
      </div>
      <div class="member-tile">
        <div class="member-avatar">👤</div>
        <div class="member-name">윤성민</div>
      </div>
      <div class="member-tile">
        <div class="member-avatar">👤</div>
        <div class="member-name">정우진</div>
      </div>
      <div class="member-tile" style="border-bottom:none;">
        <div class="member-avatar">👤</div>
        <div class="member-name">강도현</div>
      </div>
    </div>
  </div>
</div>

<div style="margin-top:16px; text-align:center;">
  <p class="text-muted text-sm">club_detail_screen.dart · ClubDetailScreen</p>
  <p class="text-muted text-xs" style="margin-top:4px">클럽 헤더 + TabBar(대회|리그|멤버) + 편집 아이콘(주최자)</p>
</div>
</body>
</html>
