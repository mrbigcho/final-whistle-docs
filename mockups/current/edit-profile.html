<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Whistle — 프로필 수정</title>
<link rel="stylesheet" href="../_common.css">
<style>
.form-section {
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.avatar-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 20px 0 8px;
}
.edit-avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(108,99,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  border: 3px solid rgba(108,99,255,0.4);
  position: relative;
  cursor: pointer;
}
.edit-avatar-overlay {
  position: absolute;
  bottom: 0; right: 0;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  border: 2px solid var(--bg);
}
.avatar-hint {
  font-size: 12px;
  color: var(--on-surface-muted);
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--on-surface-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.required-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--primary);
  display: inline-block;
}
.field-input {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 14px;
  font-size: 14px;
  color: var(--on-surface);
  width: 100%;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.field-input.focused { border-color: var(--primary); }
.field-input.textarea {
  resize: none;
  min-height: 88px;
  line-height: 1.5;
}
.field-hint {
  font-size: 11px;
  color: var(--on-surface-muted);
  padding: 0 2px;
}
.char-count {
  font-size: 11px;
  color: var(--on-surface-muted);
  text-align: right;
  padding: 0 2px;
}

.save-section {
  padding: 0 16px 32px;
}
.save-btn {
  width: 100%;
  height: 52px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 16px rgba(108,99,255,0.35);
  transition: all 0.2s;
}
.save-btn:hover { background: var(--primary-dark); }
</style>
</head>
<body>
<nav class="page-nav">
  <span class="nav-title">목업:</span>
  <a href="index.html">← 목록</a>
  <a href="profile.html">MY 프로필</a>
</nav>

<div class="phone-frame">
  <div class="phone-screen">
    <div class="app-bar">
      <div class="app-bar-icon">←</div>
      <span class="app-bar-title">프로필 수정</span>
    </div>

    <div class="content" style="padding-bottom: 16px;">

      <!-- Avatar -->
      <div class="avatar-section">
        <div class="edit-avatar">
          👤
          <div class="edit-avatar-overlay">✏️</div>
        </div>
        <div class="avatar-hint">탭하여 사진 변경</div>
      </div>

      <!-- Form fields -->
      <div class="form-section">
        <div class="form-group">
          <label class="field-label">
            닉네임 <span class="required-dot"></span>
          </label>
          <input class="field-input focused" value="김민준" placeholder="닉네임 입력">
          <div class="field-hint">다른 사용자에게 표시되는 이름입니다</div>
        </div>

        <div class="form-group">
          <label class="field-label">표시 이름</label>
          <input class="field-input" value="MinJun Kim" placeholder="표시 이름 입력 (선택)">
          <div class="field-hint">선택 사항 · 비워두면 닉네임이 사용됩니다</div>
        </div>

        <div class="form-group">
          <label class="field-label">자기소개</label>
          <textarea class="field-input textarea" placeholder="자기소개를 입력하세요 (선택)">e스포츠 토너먼트 플레이어입니다. 주로 FPS 장르를 즐깁니다.</textarea>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="field-hint">최대 200자</div>
            <div class="char-count">47 / 200</div>
          </div>
        </div>
      </div>

      <!-- Save button -->
      <div class="save-section">
        <button class="save-btn">
          저장
        </button>
      </div>

    </div>
  </div>
</div>

<div style="margin-top:16px; text-align:center;">
  <p class="text-muted text-sm">edit_profile_screen.dart · EditProfileScreen</p>
  <p class="text-muted text-xs" style="margin-top:4px">아바타 편집 + 폼(닉네임필수·표시이름·자기소개) + 저장 버튼</p>
</div>
</body>
</html>
