<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Whistle — 클럽 목록</title>
<link rel="stylesheet" href="../_common.css">
<style>
.club-card {
  margin: 4px 16px;
  background: var(--surface2);
  border-radius: 14px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color 0.2s;
}
.club-card:hover { border-color: var(--primary); }
.club-avatar {
  width: 48px; height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, #2a2060, #4B44CC);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}
.club-body { flex: 1; min-width: 0; }
.club-name-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
}
.club-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--on-surface);
}
.club-desc {
  font-size: 12px;
  color: var(--on-surface-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}
.club-meta {
  font-size: 11px;
  color: var(--on-surface-muted);
}
</style>
</head>
<body>
<nav class="page-nav">
  <span class="nav-title">목업:</span>
  <a href="index.html">← 목록</a>
  <a href="club-detail.html">클럽 상세</a>
</nav>

<div class="phone-frame">
  <div class="phone-screen">
    <div class="app-bar">
      <span class="app-bar-title">클럽</span>
      <div class="app-bar-icon" title="ID로 클럽 찾기">🔍</div>
    </div>

    <div class="content" style="padding: 8px 0 100px;">

      <div class="club-card">
        <div class="club-avatar">F</div>
        <div class="club-body">
          <div class="club-name-row">
            <span class="club-name">FC 스카이</span>
            <span class="chip public" style="font-size:10px; padding:2px 7px;">공개</span>
          </div>
          <div class="club-desc">서울 기반 e스포츠 팀 클럽</div>
          <div class="club-meta">👥 12명</div>
        </div>
        <span style="color:var(--on-surface-muted); font-size:18px;">›</span>
      </div>

      <div class="club-card" style="margin-top:8px">
        <div class="club-avatar" style="background: linear-gradient(135deg, #1a3a2a, #2e7d52);">전</div>
        <div class="club-body">
          <div class="club-name-row">
            <span class="club-name">전광석화</span>
            <span class="chip private" style="font-size:10px; padding:2px 7px;">🔒 비공개</span>
          </div>
          <div class="club-desc">친목 클럽 — 초대 전용</div>
          <div class="club-meta">👥 6명</div>
        </div>
        <span style="color:var(--on-surface-muted); font-size:18px;">›</span>
      </div>

      <div class="club-card" style="margin-top:8px">
        <div class="club-avatar" style="background: linear-gradient(135deg, #3a1a1a, #8B1A1A);">레</div>
        <div class="club-body">
          <div class="club-name-row">
            <span class="club-name">레드 드래곤즈</span>
            <span class="chip public" style="font-size:10px; padding:2px 7px;">공개</span>
          </div>
          <div class="club-desc">공격적인 플레이 스타일</div>
          <div class="club-meta">👥 20명</div>
        </div>
        <span style="color:var(--on-surface-muted); font-size:18px;">›</span>
      </div>

    </div>

    <!-- FAB -->
    <div class="fab-extended" style="bottom:88px;">
      <span>＋</span>
      <span>클럽 만들기</span>
    </div>

    <div class="bottom-nav">
      <div class="bottom-nav-item">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">홈</span>
      </div>
      <div class="bottom-nav-item">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">대회</span>
      </div>
      <div class="bottom-nav-item active">
        <span class="nav-icon">👥</span>
        <span class="nav-label">클럽</span>
      </div>
      <div class="bottom-nav-item">
        <span class="nav-icon">👤</span>
        <span class="nav-label">MY</span>
      </div>
    </div>
  </div>
</div>

<div style="margin-top:16px; text-align:center;">
  <p class="text-muted text-sm">club_list_screen.dart · ClubListScreen</p>
  <p class="text-muted text-xs" style="margin-top:4px">클럽 카드 ListView + FAB(클럽 만들기) + 🔍ID 검색</p>
</div>
</body>
</html>
