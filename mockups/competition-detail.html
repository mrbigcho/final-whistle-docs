<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Whistle — 대회 상세</title>
<link rel="stylesheet" href="_common.css">
<style>
.comp-header {
  padding: 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.comp-header-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
.comp-header-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, #4B44CC, #6C63FF);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.comp-header-info { flex: 1; }
.comp-header-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--on-surface);
  margin-bottom: 6px;
}
.comp-header-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.meta-item {
  font-size: 12px;
  color: var(--on-surface-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}
.comp-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* Standings table */
.standings-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.standings-table th {
  color: var(--on-surface-muted);
  font-weight: 600;
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  text-transform: uppercase;
}
.standings-table td {
  padding: 10px 12px;
  color: var(--on-surface);
  border-bottom: 1px solid rgba(58,58,82,0.5);
}
.standings-table tr:last-child td { border-bottom: none; }
.rank-badge {
  width: 24px; height: 24px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 12px;
}
.rank-1 { background: #B8860B; color: #fff; }
.rank-2 { background: #708090; color: #fff; }
.rank-3 { background: #8B4513; color: #fff; }
.rank-other { background: var(--surface3); color: var(--on-surface-muted); }

/* Stage selector */
.stage-selector {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--surface3);
  border-radius: 10px;
  margin: 12px 16px 0;
  font-size: 13px;
  color: var(--on-surface);
  cursor: pointer;
}
.stage-selector .stage-label { color: var(--on-surface-muted); font-size: 11px; }

/* Bracket mini preview in detail */
.bracket-preview {
  padding: 16px;
}
.bracket-round-label {
  font-size: 11px;
  color: var(--on-surface-muted);
  text-align: center;
  margin-bottom: 8px;
  font-weight: 600;
  text-transform: uppercase;
}
.bracket-match-mini {
  background: var(--surface3);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
  margin-bottom: 8px;
}
.bracket-player-mini {
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
}
.bracket-player-mini:first-child { border-bottom: 1px solid var(--border); }
.bracket-player-mini.winner { color: var(--primary-light); font-weight: 600; }
.bracket-player-mini:not(.winner) { color: var(--on-surface-muted); }
.score-badge {
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 12px;
}
.score-badge.winner { background: rgba(108,99,255,0.3); color: var(--primary-light); }
</style>
</head>
<body>
<nav class="page-nav">
  <span class="nav-title">목업:</span>
  <a href="index.html">← 목록</a>
  <a href="competition-list.html">대회 목록</a>
  <a href="bracket.html">대진표 전체</a>
  <a href="participant-list.html">참가자</a>
  <a href="match-detail.html">경기 상세</a>
</nav>

<div class="phone-frame">
  <div class="phone-screen">
    <!-- AppBar -->
    <div class="app-bar">
      <div class="app-bar-icon">←</div>
      <span class="app-bar-title">서울 오픈 2025</span>
      <div class="app-bar-icon" title="참가자 목록">👥</div>
    </div>

    <!-- Competition Header -->
    <div class="comp-header">
      <div class="comp-header-top">
        <div class="comp-header-icon">🏆</div>
        <div class="comp-header-info">
          <div class="comp-header-name">서울 오픈 2025</div>
          <div class="comp-header-meta">
            <span class="chip progress">진행 중</span>
            <span class="meta-item">👥 8/8명</span>
            <span class="meta-item">📅 2025-03-15</span>
          </div>
        </div>
      </div>
      <div class="comp-actions">
        <button class="btn btn-outlined btn-sm">스테이지 추가</button>
        <button class="btn btn-filled btn-sm">📋 결과 보고</button>
      </div>
    </div>

    <!-- Stage selector -->
    <div class="stage-selector">
      <span class="stage-label">스테이지</span>
      <span style="flex:1; font-weight:600;">8강 토너먼트</span>
      <span style="color:var(--on-surface-muted);">▼</span>
    </div>

    <!-- TabBar -->
    <div class="tab-bar" style="margin-top:12px;">
      <div class="tab active">대진표</div>
      <div class="tab">순위표</div>
    </div>

    <!-- Tab content: 대진표 -->
    <div class="content" style="padding-bottom: 16px;">
      <div class="bracket-preview">
        <div class="bracket-round-label">준결승</div>
        <div class="bracket-match-mini">
          <div class="bracket-player-mini winner">
            🏆 김민준
            <span class="score-badge winner">3</span>
          </div>
          <div class="bracket-player-mini">
            이서준
            <span class="score-badge">1</span>
          </div>
        </div>
        <div class="bracket-match-mini">
          <div class="bracket-player-mini winner">
            🏆 박지호
            <span class="score-badge winner">2</span>
          </div>
          <div class="bracket-player-mini">
            최현우
            <span class="score-badge">0</span>
          </div>
        </div>

        <div class="bracket-round-label" style="margin-top:16px;">결승</div>
        <div class="bracket-match-mini">
          <div class="bracket-player-mini">
            김민준
            <span class="score-badge">-</span>
          </div>
          <div class="bracket-player-mini">
            박지호
            <span class="score-badge">-</span>
          </div>
        </div>

        <div style="text-align:center; margin-top:16px;">
          <a href="bracket.html" style="color:var(--primary); font-size:13px; text-decoration:none;">
            전체 대진표 보기 →
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<div style="margin-top:16px; text-align:center;">
  <p class="text-muted text-sm">competition_detail_screen.dart · CompetitionDetailScreen</p>
  <p class="text-muted text-xs" style="margin-top:4px">헤더 + 스테이지 선택 + TabBar(대진표|순위표)</p>
</div>
</body>
</html>
