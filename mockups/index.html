<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Whistle — UI 목업 목록</title>
<link rel="stylesheet" href="_common.css">
<style>
body { padding: 32px 20px; }
.hero {
  text-align: center;
  margin-bottom: 36px;
}
.hero h1 {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(135deg, #6C63FF, #9D97FF);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}
.hero p { color: #8E8EA0; font-size: 14px; }

/* Loading */
.spinner-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 0;
  gap: 12px;
  color: #8E8EA0;
  font-size: 13px;
}
.spinner {
  width: 28px;
  height: 28px;
  border: 3px solid #3A3A52;
  border-top-color: #6C63FF;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Error */
.error-box {
  background: rgba(255, 80, 80, 0.1);
  border: 1.5px solid rgba(255, 80, 80, 0.4);
  border-radius: 12px;
  padding: 16px 20px;
  color: #FF8080;
  max-width: 480px;
  margin: 32px auto;
  text-align: center;
  font-size: 13px;
  line-height: 1.6;
}
.error-box strong { display: block; margin-bottom: 4px; font-size: 15px; }

/* Section */
.section {
  max-width: 960px;
  width: 100%;
  margin-bottom: 4px;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
  padding: 7px 8px;
  border-radius: 8px;
  transition: background 0.15s;
}
.section-header:hover { background: rgba(108,99,255,0.08); }
.section-title {
  font-size: 11px;
  font-weight: 600;
  color: #8E8EA0;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.badge {
  display: inline-flex;
  align-items: center;
  padding: 1px 7px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  background: rgba(108,99,255,0.2);
  color: #9D97FF;
}
.chevron {
  margin-left: auto;
  color: #5A5A72;
  font-size: 10px;
  transition: transform 0.2s;
}
.section.collapsed .chevron { transform: rotate(-90deg); }
.section.collapsed .grid { display: none; }

/* Grid — compact 3-column */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 4px 4px 12px;
}
@media (max-width: 600px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}

.mock-card {
  background: #1E1E2E;
  border: 1.5px solid #2E2E42;
  border-radius: 8px;
  padding: 9px 12px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
  min-width: 0;
}
.mock-card:hover {
  border-color: #6C63FF;
  background: rgba(108,99,255,0.08);
}
.mock-emoji {
  font-size: 16px;
  flex-shrink: 0;
}
.mock-title {
  font-size: 13px;
  font-weight: 500;
  color: #C8C8E0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.footer {
  margin-top: 40px;
  color: #3A3A52;
  font-size: 11px;
  text-align: center;
  max-width: 960px;
  width: 100%;
}
</style>
</head>
<body>
<div class="hero">
  <h1>⚽ Final Whistle</h1>
  <p>UI 목업 — 개발자 참고용 화면 명세서</p>
</div>

<div id="app"></div>

<script>
const REPO = 'mrbigcho/final-whistle-docs';
const BASE_PATH = 'mockups';
const API_BASE = `https://api.github.com/repos/${REPO}/contents`;

const EMOJI_MAP = [
  [/login|auth|signup/,     '🔐'],
  [/home/,                  '🏠'],
  [/profile/,               '👤'],
  [/edit/,                  '✏️'],
  [/competition.*list|list.*competition/, '🏆'],
  [/competition/,           '📊'],
  [/bracket/,               '🎯'],
  [/participant/,           '👥'],
  [/match/,                 '⚔️'],
  [/club.*list|list.*club/, '🏟️'],
  [/club/,                  '🛡️'],
  [/league/,                '🌟'],
  [/auction/,               '🔨'],
  [/transfer/,              '🔄'],
  [/navigation/,            '🧭'],
  [/setting/,               '⚙️'],
  [/notification/,          '🔔'],
  [/search/,                '🔍'],
];

const FOLDER_META = {
  current:  { emoji: '📱', label: '현재 화면 (Current)' },
  proposed: { emoji: '🔮', label: '제안 화면 (Proposed)' },
};

function pickEmoji(name) {
  const lower = name.toLowerCase();
  for (const [re, em] of EMOJI_MAP) if (re.test(lower)) return em;
  return '📄';
}

function labelFromFilename(filename) {
  return filename
    .replace(/\.(html|md)$/i, '')
    .replace(/-/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

async function fetchDir(path) {
  const res = await fetch(`${API_BASE}/${path}`);
  if (!res.ok) throw new Error(`API 오류: ${res.status} ${res.statusText}`);
  return res.json();
}

async function collectFiles(path, relFolder) {
  const items = await fetchDir(path);
  const groups = {};

  const fileItems = items.filter(i =>
    i.type === 'file' &&
    (i.name.endsWith('.html') || i.name.endsWith('.md')) &&
    i.name !== 'index.html'
  );
  const dirItems = items.filter(i => i.type === 'dir');

  if (fileItems.length > 0) {
    groups[relFolder] = fileItems.map(f => ({
      name: f.name,
      href: relFolder === '' ? f.name : `${relFolder}/${f.name}`,
    }));
  }

  for (const dir of dirItems) {
    const subRel = relFolder === '' ? dir.name : `${relFolder}/${dir.name}`;
    const subGroups = await collectFiles(dir.path, subRel);
    Object.assign(groups, subGroups);
  }

  return groups;
}

function renderSection(folderKey, files) {
  const folderName = folderKey.split('/').pop().toLowerCase();
  const meta = FOLDER_META[folderName] || { emoji: '📁', label: folderKey || '기타' };

  const cards = files.map(f => {
    const title = labelFromFilename(f.name);
    const emoji = pickEmoji(f.name);
    return `<a href="${f.href}" class="mock-card"><span class="mock-emoji">${emoji}</span><span class="mock-title">${title}</span></a>`;
  }).join('');

  return `
    <div class="section" data-folder="${folderKey}">
      <div class="section-header" onclick="toggleSection(this)">
        <span style="font-size:13px">${meta.emoji}</span>
        <span class="section-title">${meta.label}</span>
        <span class="badge">${files.length}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="grid">${cards}</div>
    </div>`;
}

function toggleSection(header) {
  header.closest('.section').classList.toggle('collapsed');
}

async function main() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><span>목업 목록 불러오는 중…</span></div>`;

  try {
    const groups = await collectFiles(BASE_PATH, '');

    if (Object.keys(groups).length === 0) {
      app.innerHTML = `<div class="error-box"><strong>목업 없음</strong>표시할 HTML 파일이 없습니다.</div>`;
      return;
    }

    // Order: current first, proposed second, then rest alphabetically
    const ORDER = ['current', 'proposed'];
    const keys = Object.keys(groups).sort((a, b) => {
      const ai = ORDER.indexOf(a);
      const bi = ORDER.indexOf(b);
      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;
      return a.localeCompare(b);
    });

    const html = keys.map(k => renderSection(k, groups[k])).join('');
    app.innerHTML = html + `<p class="footer">Final Whistle UI 목업 — 개발자 참고용 · 실제 Flutter 위젯 구조 반영</p>`;
  } catch (err) {
    app.innerHTML = `
      <div class="error-box">
        <strong>목록을 불러오지 못했습니다</strong>
        GitHub API 호출 중 오류가 발생했습니다.<br>
        <code style="font-size:11px;opacity:0.8">${err.message}</code>
      </div>`;
  }
}

main();
</script>
</body>
</html>
