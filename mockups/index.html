<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Whistle — UI 목업 목록</title>
<link rel="stylesheet" href="_common.css">
<style>
body { padding: 40px 20px; }
.hero {
  text-align: center;
  margin-bottom: 48px;
}
.hero h1 {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #6C63FF, #9D97FF);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.hero p { color: #8E8EA0; font-size: 15px; }

/* Loading */
.spinner-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 0;
  gap: 16px;
  color: #8E8EA0;
  font-size: 14px;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #3A3A52;
  border-top-color: #6C63FF;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Error */
.error-box {
  background: rgba(255, 80, 80, 0.1);
  border: 1.5px solid rgba(255, 80, 80, 0.4);
  border-radius: 12px;
  padding: 20px 24px;
  color: #FF8080;
  max-width: 560px;
  margin: 40px auto;
  text-align: center;
  font-size: 14px;
  line-height: 1.6;
}
.error-box strong { display: block; margin-bottom: 6px; font-size: 16px; }

/* Section */
.section {
  max-width: 960px;
  width: 100%;
  margin-bottom: 8px;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
  padding: 8px 4px;
  border-radius: 8px;
  transition: background 0.15s;
  margin-bottom: 4px;
}
.section-header:hover { background: rgba(108,99,255,0.08); }
.section-title {
  font-size: 12px;
  font-weight: 600;
  color: #8E8EA0;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  background: rgba(108,99,255,0.2);
  color: #9D97FF;
}
.chevron {
  margin-left: auto;
  color: #8E8EA0;
  font-size: 12px;
  transition: transform 0.2s;
}
.section.collapsed .chevron { transform: rotate(-90deg); }
.section.collapsed .grid { display: none; }

/* Root files (no folder) */
.section-root .section-header { cursor: default; }
.section-root .section-header:hover { background: transparent; }
.section-root .chevron { display: none; }

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  padding: 0 4px 16px;
}
.mock-card {
  background: #1E1E2E;
  border: 1.5px solid #3A3A52;
  border-radius: 16px;
  overflow: hidden;
  text-decoration: none;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
}
.mock-card:hover {
  border-color: #6C63FF;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(108,99,255,0.25);
}
.mock-preview {
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
  background: linear-gradient(135deg, #1a1a2e, #2a2a3e);
}
.mock-info {
  padding: 14px 16px;
  flex: 1;
}
.mock-title {
  font-size: 15px;
  font-weight: 700;
  color: #E2E2F0;
  margin-bottom: 4px;
}
.mock-path {
  font-size: 10px;
  color: #6C63FF;
  margin-top: 6px;
  font-family: monospace;
}

.footer {
  margin-top: 48px;
  color: #3A3A52;
  font-size: 12px;
  text-align: center;
  max-width: 960px;
  width: 100%;
}
</style>
</head>
<body>
<div class="hero">
  <h1>⚽ Final Whistle</h1>
  <p>UI 목업 — 개발자 참고용 화면 명세서</p>
</div>

<div id="app"></div>

<script>
const REPO = 'mrbigcho/final-whistle-docs';
const BASE_PATH = 'mockups';
const API_BASE = `https://api.github.com/repos/${REPO}/contents`;

// Emoji map by folder or filename keyword
const EMOJI_MAP = [
  [/login|auth|signup/,     '🔐'],
  [/home/,                  '🏠'],
  [/profile/,               '👤'],
  [/edit/,                  '✏️'],
  [/competition.*list|list.*competition/, '🏆'],
  [/competition.*detail|detail.*competition/, '📊'],
  [/bracket/,               '🎯'],
  [/participant/,           '👥'],
  [/match/,                 '⚔️'],
  [/club.*list|list.*club/, '🏟️'],
  [/club/,                  '🛡️'],
  [/league/,                '🌟'],
  [/auction/,               '🔨'],
  [/transfer/,              '🔄'],
  [/setting/,               '⚙️'],
  [/notification/,          '🔔'],
  [/search/,                '🔍'],
];

const FOLDER_EMOJI = {
  auth:        '🔐',
  competition: '🏆',
  club:        '🛡️',
  league:      '🌟',
  profile:     '👤',
  match:       '⚔️',
};

function pickEmoji(name) {
  const lower = name.toLowerCase();
  for (const [re, em] of EMOJI_MAP) {
    if (re.test(lower)) return em;
  }
  return '📄';
}

function labelFromFilename(filename) {
  return filename
    .replace(/\.html$/i, '')
    .replace(/-/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

function labelFromFolder(folder) {
  return folder.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// Fetch a directory and return { files: [...], dirs: [...] }
async function fetchDir(path) {
  const res = await fetch(`${API_BASE}/${path}`);
  if (!res.ok) throw new Error(`API 오류: ${res.status} ${res.statusText}`);
  return res.json();
}

// Recursively collect html files grouped by relative folder
async function collectFiles(path, relFolder) {
  const items = await fetchDir(path);
  const groups = {}; // relFolder -> [{ name, path, htmlPath }]

  const fileItems = items.filter(i =>
    i.type === 'file' &&
    i.name.endsWith('.html') &&
    i.name !== 'index.html'
  );
  const dirItems = items.filter(i => i.type === 'dir');

  if (fileItems.length > 0) {
    groups[relFolder] = fileItems.map(f => ({
      name: f.name,
      path: f.path,
      // Relative URL from mockups/index.html
      href: relFolder === ''
        ? f.name
        : `${relFolder}/${f.name}`,
    }));
  }

  for (const dir of dirItems) {
    const subRel = relFolder === '' ? dir.name : `${relFolder}/${dir.name}`;
    const subGroups = await collectFiles(dir.path, subRel);
    Object.assign(groups, subGroups);
  }

  return groups;
}

function renderSection(folderKey, files) {
  const isRoot = folderKey === '';
  const label = isRoot ? '기타' : labelFromFolder(folderKey.split('/').pop());
  const folderEmoji = isRoot ? '📁' : (FOLDER_EMOJI[folderKey.split('/').pop().toLowerCase()] || '📁');

  const cards = files.map(f => {
    const title = labelFromFilename(f.name);
    const emoji = pickEmoji(f.name);
    return `
      <a href="${f.href}" class="mock-card">
        <div class="mock-preview">${emoji}</div>
        <div class="mock-info">
          <div class="mock-title">${title}</div>
          <div class="mock-path">${f.href}</div>
        </div>
      </a>`;
  }).join('');

  return `
    <div class="section${isRoot ? ' section-root' : ''}" data-folder="${folderKey}">
      <div class="section-header" onclick="toggleSection(this)">
        <span style="font-size:14px">${folderEmoji}</span>
        <span class="section-title">${label}</span>
        <span class="badge">${files.length}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="grid">${cards}</div>
    </div>`;
}

function toggleSection(header) {
  const section = header.closest('.section');
  if (section.classList.contains('section-root')) return;
  section.classList.toggle('collapsed');
}

async function main() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span>목업 목록 불러오는 중…</span>
    </div>`;

  try {
    const groups = await collectFiles(BASE_PATH, '');

    if (Object.keys(groups).length === 0) {
      app.innerHTML = `<div class="error-box"><strong>목업 없음</strong>표시할 HTML 파일이 없습니다.</div>`;
      return;
    }

    // Sort: root first, then alphabetical
    const keys = Object.keys(groups).sort((a, b) => {
      if (a === '') return -1;
      if (b === '') return 1;
      return a.localeCompare(b);
    });

    const html = keys.map(k => renderSection(k, groups[k])).join('');
    app.innerHTML = html + `
      <p class="footer">Final Whistle UI 목업 — 개발자 참고용 · 실제 Flutter 위젯 구조 반영</p>`;
  } catch (err) {
    app.innerHTML = `
      <div class="error-box">
        <strong>목록을 불러오지 못했습니다</strong>
        GitHub API 호출 중 오류가 발생했습니다.<br>
        <code style="font-size:11px;opacity:0.8">${err.message}</code>
      </div>`;
  }
}

main();
</script>
</body>
</html>
