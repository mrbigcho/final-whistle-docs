<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문서 뷰어</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      padding: 16px;
      min-height: 100vh;
    }
    a { color: #58a6ff; }
    .back-link { display: inline-block; margin-bottom: 16px; font-size: 14px; }
    .doc-title { font-size: 20px; color: #e6edf3; margin-bottom: 4px; }
    .doc-path { font-size: 12px; color: #8b949e; margin-bottom: 24px; }
    .loading { text-align: center; padding: 40px 0; color: #8b949e; }
    .error { background: #3d1f1f; border: 1px solid #f85149; border-radius: 8px; padding: 16px; color: #f85149; }

    /* 마크다운 스타일 - 모든 요소가 100% 안에서 */
    .md h1 { font-size: 1.5em; color: #e6edf3; border-bottom: 1px solid #30363d; padding-bottom: 8px; margin: 24px 0 16px; }
    .md h2 { font-size: 1.3em; color: #e6edf3; border-bottom: 1px solid #30363d; padding-bottom: 6px; margin: 20px 0 12px; }
    .md h3 { font-size: 1.1em; color: #e6edf3; margin: 16px 0 8px; }
    .md p { margin: 0 0 16px; }
    .md ul, .md ol { padding-left: 24px; margin: 0 0 16px; }
    .md li { margin: 4px 0; }
    .md code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    .md pre { background: #161b22; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 0 0 16px; }
    .md pre code { background: none; padding: 0; }
    .md blockquote { border-left: 3px solid #30363d; padding-left: 12px; color: #8b949e; margin: 0 0 16px; }
    .md table { width: 100%; border-collapse: collapse; margin: 0 0 16px; font-size: 14px; }
    .md th, .md td { border: 1px solid #30363d; padding: 8px; text-align: left; }
    .md th { background: #161b22; color: #e6edf3; }
    .md img { max-width: 100%; height: auto; }
    .md hr { border: none; border-top: 1px solid #30363d; margin: 24px 0; }
    .table-wrap { overflow-x: auto; margin: 0 0 16px; }
    .table-wrap table { margin: 0; }
  </style>
</head>
<body>
  <a href="./" class="back-link">← 목록으로 돌아가기</a>
  <div id="title" class="doc-title"></div>
  <div id="path" class="doc-path"></div>
  <div id="content"><div class="loading">로딩 중...</div></div>

  <script>
    const params = new URLSearchParams(location.search);
    const file = params.get('file');
    const titleEl = document.getElementById('title');
    const pathEl = document.getElementById('path');
    const contentEl = document.getElementById('content');

    if (!file) {
      contentEl.innerHTML = '<div class="error">파일 경로가 지정되지 않았습니다.</div>';
    } else {
      const name = file.split('/').pop().replace('.md', '').replace(/-/g, ' ');
      titleEl.textContent = name.charAt(0).toUpperCase() + name.slice(1);
      pathEl.textContent = file;

      fetch(`https://raw.githubusercontent.com/mrbigcho/final-whistle-docs/main/mockups/${file}`)
        .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
        .then(md => {
          contentEl.innerHTML = '<div class="md">' + marked.parse(md) + '</div>';
          // table을 스크롤 가능한 div로 감싸기
          contentEl.querySelectorAll('table').forEach(t => {
            const wrap = document.createElement('div');
            wrap.className = 'table-wrap';
            t.parentNode.insertBefore(wrap, t);
            wrap.appendChild(t);
          });
        })
        .catch(e => {
          contentEl.innerHTML = '<div class="error">문서를 불러올 수 없습니다: ' + e.message + '</div>';
        });
    }
  </script>
</body>
</html>
